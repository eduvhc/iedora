# CI — dois jobs paralelos:
#   1. ci     — typecheck/lint/test (correctness)
#   2. audit  — gitleaks/hadolint/osv-scanner (security)
#
# Eram dois workflows separados (audit.yml). Consolidado num só para
# o run-page do Gitea mostrar tudo numa view, mantendo paralelismo —
# capacity:3 do runner spawna os 2 jobs side-by-side, total wall =
# max(ci, audit) ≈ 4m de ci (audit é ~10-25s).
#
# Cron semanal corre apenas o audit (CVE database refresca-se mesmo
# sem push). `if: github.event_name != 'schedule'` no ci evita correr
# typecheck/lint/test a 06:00 de Segunda.

name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Segunda 06:00 UTC — pesca CVEs novas que apareceram na OSV
    # durante a semana mesmo sem push (osv-scanner cresce com a base).
    # Só o job `audit` corre (ver `if:` no job `ci`).
    - cron: '0 6 * * 1'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    if: github.event_name != 'schedule'
    # bun-debian label = oven/bun:1.3-debian (mapeado em
    # homelab-core-infra/gitea-runner-config.yaml). Imagem já tem Bun
    # instalado — skip oven-sh/setup-bun@v2 (que rebaixa o binário a
    # cada run, ignorando o cache do Gitea).
    runs-on: bun-debian
    timeout-minutes: 15
    # Bind-mount directo do bun install cache do host. Substitui
    # actions/cache@v4 (que demorava ~2min a tar+gzip+upload+download
    # 500MB de cache via cache-server cross-network). Filesystem access
    # nativo → ~5s "restore". /var/cache/bun está em valid_volumes do
    # runner config.
    container:
      image: oven/bun:1.3-debian
      volumes:
        - /var/cache/bun:/root/.bun/install/cache
    steps:
      - uses: actions/checkout@v4

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: typecheck (all workspaces via tsc --build refs)
        run: bun run typecheck

      - name: lint (all workspaces in parallel)
        run: bun run lint

      - name: test (all workspaces)
        run: bun run test

  audit:
    # 3 tools: gitleaks (secrets) + hadolint (Dockerfile) + osv-scanner
    # (CVE lockfile). Binários pinned + cached em /var/cache/audit-tools
    # (bind-mount do host, valid_volumes whitelistado).
    # Baselines: .gitleaks-baseline.json + osv-scanner.toml (root).
    runs-on: bun-debian
    timeout-minutes: 10
    container:
      image: oven/bun:1.3-debian
      volumes:
        - /var/cache/audit-tools:/opt/audit-bin
    env:
      GITLEAKS_VERSION: 8.30.1
      HADOLINT_VERSION: 2.14.0
      OSV_VERSION: 2.3.8
      # Não sobre-escrever PATH global — o bun image tem
      # `/usr/local/bun-node-fallback-bin` no fim (necessário para o
      # actions/checkout@v4 encontrar `node`). Cada step que precisa
      # dos audit tools chama-os por caminho absoluto via /opt/audit-bin.
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks --detect varre commits — precisa do histórico.
          # `0` = full clone. Para PRs grandes considerar fetch-depth
          # de 50 + scan apenas dos commits novos via --log-opts.
          fetch-depth: 0

      - name: Restore or install audit binaries
        # Idempotente: cada tool só descarrega se versão actual no cache
        # diferir da pinned. Cache persiste entre runs via bind-mount,
        # típico re-run salta os 3 curls (~10s saved).
        # `shell: bash` porque o `local` + `function` style precisa de
        # bash (act_runner default é `sh -e` em Linux).
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /opt/audit-bin

          need() {
            local bin="$1" version_flag="$2" want="$3"
            [ ! -x "/opt/audit-bin/$bin" ] && return 0
            local have
            have=$("/opt/audit-bin/$bin" "$version_flag" 2>&1 | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" | head -1)
            [ "$have" != "$want" ]
          }

          # oven/bun:1.3-debian é minimal: sem curl (download dos binários),
          # sem git (gitleaks varre histórico). Cada job spawna container
          # fresh — git é always-needed, curl só se algum tool fizer cache
          # miss.
          install_pkgs() {
            local pkgs=("$@")
            local missing=()
            for p in "${pkgs[@]}"; do
              command -v "$p" >/dev/null || missing+=("$p")
            done
            if [ ${#missing[@]} -gt 0 ]; then
              echo "→ apt install: ${missing[*]}"
              apt-get update -qq >/dev/null
              apt-get install -y --no-install-recommends -qq "${missing[@]}" ca-certificates >/dev/null
            fi
          }

          install_pkgs git

          if need gitleaks version "$GITLEAKS_VERSION"; then
            install_pkgs curl
            echo "→ download gitleaks $GITLEAKS_VERSION"
            curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
              | tar -xz -C /opt/audit-bin gitleaks
          fi

          if need hadolint --version "$HADOLINT_VERSION"; then
            install_pkgs curl
            echo "→ download hadolint $HADOLINT_VERSION"
            curl -fsSL -o /opt/audit-bin/hadolint \
              "https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION}/hadolint-linux-x86_64"
            chmod +x /opt/audit-bin/hadolint
          fi

          if need osv-scanner --version "$OSV_VERSION"; then
            install_pkgs curl
            echo "→ download osv-scanner $OSV_VERSION"
            curl -fsSL -o /opt/audit-bin/osv-scanner \
              "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64"
            chmod +x /opt/audit-bin/osv-scanner
          fi

          /opt/audit-bin/gitleaks version
          /opt/audit-bin/hadolint --version
          /opt/audit-bin/osv-scanner --version

      - name: gitleaks (secret scan — full history, baseline-filtered)
        # --baseline-path: ignora os 23 findings históricos pre-adoção
        # (test fixtures em products/genkan removido, .env antigos, e
        # secrets em dev/tofu state file purged). CI bloqueia apenas
        # leaks NOVOS. Para re-gerar (depois de purge de história):
        #   gitleaks detect --report-format json --report-path .gitleaks-baseline.json
        run: /opt/audit-bin/gitleaks detect --baseline-path .gitleaks-baseline.json --redact --verbose --no-banner --exit-code 1

      - name: hadolint (Dockerfile lint)
        # failure-threshold=error → warnings aparecem no log mas não
        # quebram CI. Próxima leva: corrigir DL4006 (real bug — exit
        # code do `npm install … | tail -3` é o do tail).
        run: /opt/audit-bin/hadolint --failure-threshold error apps/web/Dockerfile

      - name: osv-scanner (lockfile CVEs)
        # Picks up osv-scanner.toml do cwd automaticamente.
        # Suppressões known + tracked vivem lá com rationale + review date.
        run: /opt/audit-bin/osv-scanner --lockfile=bun.lock
