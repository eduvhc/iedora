# Single-job CI — typecheck + lint + test em sequência num só container.
# Matrix por workspace foi removida porque cada job pagava 1× container
# startup + 1× bun install (~30s overhead/job × 9 jobs ≈ 5 min wasted).
# Root scripts já iteram workspaces via `bun run --workspaces`.
#
# Trade-off aceite: status na UI vira 1 (pass/fail) em vez de 9.
# Beneficio: full CI pass de ~10× mais rápido em cold cache,
# 3-5× em warm.

name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    # bun-debian label = oven/bun:1.3-debian (mapeado em
    # homelab-core-infra/gitea-runner-config.yaml). Imagem já tem Bun
    # instalado — skip oven-sh/setup-bun@v2 (que rebaixa o binário a
    # cada run, ignorando o cache do Gitea).
    runs-on: bun-debian
    timeout-minutes: 15
    # Bind-mount directo do bun install cache do host. Substitui
    # actions/cache@v4 (que demorava ~2min a tar+gzip+upload+download
    # 500MB de cache via cache-server cross-network). Filesystem access
    # nativo → ~5s "restore". /var/cache/bun está em valid_volumes do
    # runner config.
    container:
      image: oven/bun:1.3-debian
      volumes:
        - /var/cache/bun:/root/.bun/install/cache
    steps:
      - uses: actions/checkout@v4

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: typecheck (all workspaces via tsc --build refs)
        run: bun run typecheck

      - name: lint (all workspaces in parallel)
        run: bun run lint

      - name: test (all workspaces)
        run: bun run test
