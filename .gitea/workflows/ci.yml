# Pipeline — 4 jobs no mesmo workflow para gating natural e UI única:
#
#   changes → path filter (2 outputs: code + deploy)       [PR + push main + dispatch]
#   ci      → correctness (typecheck/lint/test)            [needs code=true; skip cron]
#   audit   → security    (gitleaks/hadolint/osv)          [PR + push main + dispatch + cron]
#   deploy  → kamal deploy                                  [needs deploy=true; push main + dispatch]
#
# `code` = .ts/.tsx/.js/.mjs/.cjs, package.json, bun.lock,
#         tsconfig*, vitest.config*, eslint.config*
# `deploy` = code + Dockerfile + config/** + .kamal/**
#
# NÃO accionam (apenas `audit` corre):
#   docs/**, *.md, AGENTS.md, .gitignore,
#   .gitea/workflows/**, .gitea/audit/**, .gitea/deploy/**,
#   homelab-core-infra/** (afecta infra, não app)
#
# `audit` corre sempre — gitleaks scan histórico, secrets podem aparecer
# em docs também.
#
# Steps inline (não composite actions) para o Gitea Actions mostrar
# cada step individualmente — bug #31397 ofusca steps dentro de
# composite. Bash não-trivial vive em .gitea/<concern>/*.sh (ex.:
# .gitea/audit/install-tools.sh), invocado por path absoluto. Mantém
# o workflow legível + bash testável isoladamente via shellcheck.
#
# Concurrency por-job (em vez de workflow-level): ci/audit cancelam
# runs antigos no mesmo branch para feedback rápido; deploy nunca
# cancela (mid-deploy abort = estado inconsistente). Cron weekly só
# corre `audit` (skip ci via `if:`, deploy gated por `needs` + `if:`)
# — CVE database refresca-se sem push.

name: Pipeline

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Segunda 06:00 UTC — pesca CVEs novas

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Path filter: ci + deploy só correm se source mudou (typescript,
  # lockfile, Dockerfile, configs Kamal, workflows próprios). Docs-only
  # PR/push skipa typecheck/lint/test/deploy. `audit` corre sempre
  # (gitleaks scan history; secret pode aparecer em docs também).
  # `workflow_dispatch` e `schedule` ignoram este filtro.
  # ─────────────────────────────────────────────────────────────────
  changes:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          # `fetch-depth: 2` chega para push events (dorny usa
          # git merge-base contra parent). Para PR, dorny consulta a
          # API e não precisa de history.
          fetch-depth: 2
      - id: filter
        uses: dorny/paths-filter@v4
        # 2 outputs:
        #   code   → afecta typecheck/lint/test
        #   deploy → code + tudo o que afecta a imagem ou config Kamal
        #
        # Mudanças que NÃO accionam nada (`audit` corre sempre):
        #   docs/**, *.md, AGENTS.md, .gitignore,
        #   .gitea/workflows/**, .gitea/audit/**, .gitea/deploy/**,
        #   homelab-core-infra/** (afecta infra, não app)
        #
        # v4 suporta YAML anchor (`&code` reusado em `deploy:` via
        # `*code`) — flatten implícito em sequence position.
        with:
          filters: |
            code: &code
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.mjs'
              - '**/*.cjs'
              - '**/package.json'
              - 'bun.lock'
              - '**/tsconfig*.json'
              - '**/vitest.config.*'
              - '**/eslint.config.*'
            deploy:
              - *code
              - '**/Dockerfile'
              - 'config/**'
              - '.kamal/**'

  # ─────────────────────────────────────────────────────────────────
  # Correctness gate: typecheck + lint + test em paralelo workspace.
  # bun-debian label → oven/bun:1.3-debian (homelab-core-infra/
  # gitea-runner-config.yaml: GITEA_RUNNER_LABELS).
  # Bind-mount /var/cache/bun: bun install cache persiste entre runs.
  # ─────────────────────────────────────────────────────────────────
  ci:
    needs: changes
    if: github.event_name != 'schedule' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.code == 'true')
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true
    runs-on: bun-debian
    timeout-minutes: 15
    container:
      image: oven/bun:1.3-debian
      volumes:
        - /var/cache/bun:/root/.bun/install/cache
    steps:
      - uses: actions/checkout@v4

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: typecheck (all workspaces, paralelo, tsgo)
        run: bun run typecheck

      - name: lint (all workspaces, paralelo, eslint)
        run: bun run lint

      - name: test (all workspaces, sequencial, vitest internamente paraleliza)
        run: bun run test

  # ─────────────────────────────────────────────────────────────────
  # Security gate: 3 tools sobre o filesystem + lockfile + history.
  # Binários cached em /var/cache/audit-tools (bind-mount, idempotent
  # install via .gitea/audit/install-tools.sh).
  # ─────────────────────────────────────────────────────────────────
  audit:
    concurrency:
      group: audit-${{ github.ref }}
      cancel-in-progress: true
    runs-on: bun-debian
    timeout-minutes: 10
    container:
      image: oven/bun:1.3-debian
      volumes:
        - /var/cache/audit-tools:/opt/audit-bin
    env:
      GITLEAKS_VERSION: 8.30.1
      HADOLINT_VERSION: 2.14.0
      OSV_VERSION: 2.3.8
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks varre commits — precisa do histórico completo.
          fetch-depth: 0

      - name: Restore or install audit binaries
        # Script idempotent: cada tool só descarrega se diferente da
        # versão pinned (env above). Cold start ~15s (apt + 3 binaries),
        # steady-state ~1s. Bash extraído para shellcheck local.
        shell: bash
        run: .gitea/audit/install-tools.sh

      - name: gitleaks (secret scan — full history, baseline-filtered)
        # --baseline-path: ignora 23 findings históricos pre-adoção
        # (test fixtures + .env + tfstate purged). Bloqueia só leaks
        # NOVOS. Re-gerar: gitleaks detect --report-format json
        # --report-path .gitleaks-baseline.json
        run: /opt/audit-bin/gitleaks detect --baseline-path .gitleaks-baseline.json --redact --verbose --no-banner --exit-code 1

      - name: hadolint (Dockerfile lint)
        # Wrapper converte findings em workflow annotations
        # (::warning::/::error::) que Gitea renderiza inline no PR.
        # Threshold: só level=error quebra CI. Warnings actuais aparecem
        # no PR para tracking (DL3008/DL3003/DL4006).
        run: .gitea/audit/run-hadolint.sh apps/web/Dockerfile

      - name: osv-scanner (lockfile CVEs)
        # --format gh-annotations: native emission de annotations para
        # cada CVE encontrada. Se houver findings novos, aparecem no PR
        # como comments inline no lockfile.
        run: /opt/audit-bin/osv-scanner --lockfile=bun.lock --format gh-annotations

  # ─────────────────────────────────────────────────────────────────
  # Deploy gate: dispara Kamal NO Beelink via SSH. Não há Kamal,
  # buildx ou ruby a correr no CI runner — só `rsync` e `ssh`.
  #
  # Razão: o gitea-runner corre fisicamente no Beelink, e o build/push
  # do Kamal entre runner-container e buildkit-container ignora o
  # insecure-registries do daemon.json (basecamp/kamal#937). Em vez de
  # layeran workarounds (buildkitd.toml + pre-create builder, etc),
  # corremos Kamal no host directamente — usa o default `docker`
  # buildx driver (= daemon do host) que respeita o daemon.json.
  #
  # Setup do Beelink (Ruby + Kamal gem + /opt/iedora) é feito 1x via
  # `./homelab-core-infra/up.sh --host ssh://root@192.168.50.53`
  # (idempotent).
  #
  # `kamal deploy` no Beelink:
  #   - build local (single arch amd64 = host arch, sem emulação)
  #   - push 192.168.50.53:3030 = localhost-to-localhost (insecure OK)
  #   - .kamal/hooks/pre-deploy aplica migrations
  #   - blue-green swap; healthcheck fail → versão antiga continua
  # ─────────────────────────────────────────────────────────────────
  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.deploy == 'true')
    needs: [changes, ci, audit]
    concurrency:
      group: deploy-production
      cancel-in-progress: false   # mid-deploy abort would leave inconsistent state
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap SSH key from BWS
        # SSH key + project ID. Tudo o resto (Kamal, ruby, buildx) vive
        # no Beelink — runner só precisa de chegar lá.
        shell: bash
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
        run: |
          set -e
          BWS_VER="${BWS_VER:-0.5.0}"
          curl -fsSL "https://github.com/bitwarden/sdk-sm/releases/download/bws-v${BWS_VER}/bws-x86_64-unknown-linux-gnu-${BWS_VER}.zip" -o /tmp/bws.zip
          unzip -q /tmp/bws.zip -d /tmp/bws
          install -m 0755 /tmp/bws/bws /usr/local/bin/bws

          PROJECT_ID=$(bws project list -o json | jq -r '.[0].id')
          echo "KAMAL_BWS_PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          bws secret list "$PROJECT_ID" -o json \
            | python3 -c 'import sys,json; [print(s["value"]) for s in json.loads(sys.stdin.read(), strict=False) if s["key"]=="HOMELAB_SSH_PRIVATE_KEY"]' \
            > ~/.ssh/ci_ed25519
          chmod 600 ~/.ssh/ci_ed25519
          ssh-keyscan -H 192.168.50.53 >> ~/.ssh/known_hosts 2>/dev/null

      - name: rsync source + trigger Kamal on Beelink
        # rsync excluindo .git (não precisamos do histórico em /opt/iedora,
        # só do snapshot deste commit). --delete remove ficheiros que já
        # não existem na source. ssh trigger passa env vars in-line para
        # o shell remoto consumir. `kamal lock release || true` é
        # idempotent — recupera de runs cancelados.
        shell: bash
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
        run: |
          set -e
          rsync -azP --delete --exclude='.git' --exclude='node_modules' \
            -e 'ssh -i ~/.ssh/ci_ed25519' \
            ./ root@192.168.50.53:/opt/iedora/

          # shellcheck disable=SC2087  # intentional: env vars expanded
          # client-side, send resolved values to SSH (server doesn't have them).
          ssh -i ~/.ssh/ci_ed25519 root@192.168.50.53 bash <<EOF
          set -e
          cd /opt/iedora
          export BWS_ACCESS_TOKEN='$BWS_ACCESS_TOKEN'
          export KAMAL_REGISTRY_PASSWORD='$KAMAL_REGISTRY_PASSWORD'
          export KAMAL_BWS_PROJECT_ID='$KAMAL_BWS_PROJECT_ID'
          kamal lock release -d production || true
          kamal deploy -d production
          EOF
