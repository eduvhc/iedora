# Kamal 2 — shared base config.
# Destination-specific values (hosts, FQDN, TLS strategy, accessory hosts)
# live in config/deploy.<dest>.yml and are merged when you run with -d.
#
# Two destinations are configured:
#   onprem   — LAN box behind a Cloudflare Tunnel (TLS terminates at the edge)
#   hetzner  — Hetzner Cloud VM, public IP, kamal-proxy does Let's Encrypt
#
# Daily use goes through the Makefile (DEST=onprem default):
#   make kamal-deploy                 # onprem
#   make kamal-deploy DEST=hetzner    # hetzner

service: meta-menu

image: eduvhc/meta-menu

# kamal-proxy gates zero-downtime + routing. Destination overrides set
# `host` (FQDN) and `ssl` (true for hetzner, false for cloudflared).
proxy:
  app_port: 3000
  # When ssl: false, kamal-proxy does NOT forward X-Forwarded-* by default.
  # Cloudflare Tunnel sets them; we must opt in to preserve client IP/proto.
  forward_headers: true
  healthcheck:
    path: /up
    interval: 1
    timeout: 5
  buffering:
    requests: true
    responses: true
    # Default is 1 GB — way too loose. Image uploads cap is ~5 MB
    # client-side; 10 MB here gives headroom.
    max_request_body: 10_000_000

# GHCR via the gh-CLI token (gitignored secrets file resolves it).
registry:
  server: ghcr.io
  username: eduvhc
  password:
    - KAMAL_REGISTRY_PASSWORD

ssh:
  user: deploy
  port: 22

builder:
  arch: amd64
  cache:
    type: registry
    image: ghcr.io/eduvhc/meta-menu-build-cache
    options: mode=max,compression=zstd

# Env vars — secrets resolved from .kamal/secrets-common + .kamal/secrets.<dest>.
# BETTER_AUTH_URL is destination-scoped (depends on FQDN) — set in dest file.
env:
  clear:
    NEXT_TELEMETRY_DISABLED: "1"
    # S3 config — values come from the sourced .envrc (set by cf-sync.sh after
    # `make cf-apply`). Not secrets — the endpoint contains your account_id
    # which is already visible in any R2 URL.
    S3_ENDPOINT: <%= ENV.fetch("S3_ENDPOINT") %>
    S3_REGION:   <%= ENV.fetch("S3_REGION", "auto") %>
    S3_BUCKET:   <%= ENV.fetch("S3_BUCKET", "metamenu") %>
  secret:
    - BETTER_AUTH_SECRET
    - DATABASE_URL
    - REDIS_URL
    - S3_ACCESS_KEY
    - S3_SECRET_KEY

# Accessories run on the same host as the app (single-server topology).
# `host` is set per destination so accessories follow the app server.
# Crucial: NO `port:` key — publishing 5432:5432 binds to 0.0.0.0 and
# Docker's NAT rules sit BEFORE UFW's filter rules, so the host firewall
# wouldn't protect Postgres. The app reaches it via the `kamal` Docker
# network using the container name (meta-menu-postgres).
accessories:
  postgres:
    image: postgres:18-alpine
    env:
      clear:
        POSTGRES_USER: postgres
        POSTGRES_DB: metamenu
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql

  redis:
    image: redis:7-alpine
    directories:
      - data:/data

  # S3-compatible object storage. cloudflared on the host points at
  # 127.0.0.1:9000 (loopback only — not on the LAN), so we publish the port
  # to loopback. The app reaches MinIO publicly via https://<assets-hostname>
  # through the tunnel, so server-side ops use the same URL as browser presigns
  # (no internal/external split).
  #
  # MinIO root creds double as S3 access keys — S3_ACCESS_KEY = MINIO_ROOT_USER,
  # S3_SECRET_KEY = MINIO_ROOT_PASSWORD. Both come from .kamal/secrets-common.
  minio:
    image: minio/minio:latest
    port: "127.0.0.1:9000:9000"
    cmd: server /data --console-address ":9001"
    env:
      secret:
        - MINIO_ROOT_USER
        - MINIO_ROOT_PASSWORD
    directories:
      - data:/data
