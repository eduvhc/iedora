# Destination override: Hetzner Cloud VM.
# Same Cloudflare Tunnel topology as onprem — public IP is unused for ingress.
# Source .envrc.hetzner (set by `make cf-up NAME=hetzner ...`) before deploying;
# it exports PUBLIC_HOSTNAME, ASSETS_HOSTNAME, S3_*, CLOUDFLARED_TUNNEL_TOKEN.
#
# Also export HETZNER_HOST (= tofu output -raw server_host from the hetzner env).

servers:
  web:
    hosts:
      - <%= ENV.fetch("HETZNER_HOST") %>

proxy:
  ssl: false                       # Cloudflare Tunnel terminates TLS at the edge
  host: <%= ENV.fetch("PUBLIC_HOSTNAME") %>

env:
  clear:
    BETTER_AUTH_URL: <%= "https://#{ENV.fetch('PUBLIC_HOSTNAME')}" %>

accessories:
  postgres:
    host: <%= ENV.fetch("HETZNER_HOST") %>
  redis:
    host: <%= ENV.fetch("HETZNER_HOST") %>
  minio:
    host: <%= ENV.fetch("HETZNER_HOST") %>
